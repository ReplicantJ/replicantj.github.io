name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Run JS-based actions on Node 24 (see https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_DISCORD_USER_ID: ${{ vars.VITE_DISCORD_USER_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
